name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "Missing VERCEL_TOKEN secret."
            exit 1
          fi
          if [ "${{ github.event.inputs.target }}" = "preview" ]; then
            sh quick-deploy-vercel.sh --preview
          else
            sh quick-deploy-vercel.sh
          fi
